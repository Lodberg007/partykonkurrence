<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Partykonkurrence{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/i18n.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <header class="app-header" style="display:flex;align-items:center;justify-content:space-between;">
            <a href="/" class="logo">Partykonkurrence</a>
            <div class="lang-switcher" id="lang-switcher"></div>
        </header>
        <main class="app-main">
            {% block body %}{% endblock %}
        </main>
    </div>
    <script>
        // Init sprogvælger i headeren
        const sw = document.getElementById('lang-switcher');
        if (sw) sw.replaceWith(createLangSwitcher());
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
